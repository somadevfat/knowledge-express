parameters:
  - name: id
    in: path
    required: true
    schema:
      type: string
      minLength: 1
get:
  summary: Get a knowledge article
  operationId: getKnowledge
  security: []
  responses:
    "200":
      description: Knowledge article.
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                $ref: "../components/schemas/knowledge.yaml"
    "404":
      $ref: "../components/responses/not-found.yaml"
