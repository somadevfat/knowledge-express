openapi: 3.0.3
info:
  title: Clean Architecture Knowledge API
  version: 0.1.0
  license:
    name: UNLICENSED
security: []
servers:
  - url: http://localhost:3000
paths:
  /health:
    $ref: "./paths/health.yaml"
  /knowledge:
    $ref: "./paths/knowledge.yaml"
  /knowledge/search:
    $ref: "./paths/knowledge-search.yaml"
  /knowledge/tree:
    $ref: "./paths/knowledge-tree.yaml"
  /knowledge/sync:
    $ref: "./paths/knowledge-sync.yaml"
  /knowledge/{id}:
    $ref: "./paths/knowledge-by-id.yaml"
components:
  schemas:
    Knowledge:
      $ref: "./components/schemas/knowledge.yaml"
    KnowledgeTreeNode:
      $ref: "./components/schemas/knowledge-tree-node.yaml"
    SyncKnowledgeResult:
      $ref: "./components/schemas/sync-knowledge-result.yaml"
    ErrorResponse:
      $ref: "./components/schemas/error-response.yaml"
  responses:
    ValidationError:
      $ref: "./components/responses/validation-error.yaml"
    NotFound:
      $ref: "./components/responses/not-found.yaml"
