services:
  backend:
    build:
      context: ./backend
    container_name: clean-architecture-knowledge-backend
    environment:
      PORT: 3000
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-}
      GITHUB_BRANCH: ${GITHUB_BRANCH:-main}
      GITHUB_KNOWLEDGE_PATH: ${GITHUB_KNOWLEDGE_PATH:-docs}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    ports:
      - "3000:3000"
