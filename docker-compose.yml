services:
  db:
    image: postgres:16-alpine
    container_name: clean-architecture-knowledge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowledge_app
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledge_app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
